name: Build GBA ROM

on:
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Cache devkitPro
        id: cache-dkp
        uses: actions/cache@v4
        with:
          path: /opt/devkitpro
          key: devkitpro-gba-${{ runner.os }}-v1

      - name: Install devkitPro pacman
        if: steps.cache-dkp.outputs.cache-hit != 'true'
        run: |
          wget -U "dkp-apt" https://apt.devkitpro.org/install-devkitpro-pacman
          chmod +x ./install-devkitpro-pacman
          sudo ./install-devkitpro-pacman

      - name: Install GBA dev packages
        if: steps.cache-dkp.outputs.cache-hit != 'true'
        run: sudo dkp-pacman -Sy --noconfirm gba-dev

      - name: Set up environment
        run: |
          echo "DEVKITPRO=/opt/devkitpro" >> $GITHUB_ENV
          echo "DEVKITARM=/opt/devkitpro/devkitARM" >> $GITHUB_ENV
          echo "/opt/devkitpro/tools/bin" >> $GITHUB_PATH
          echo "/opt/devkitpro/devkitARM/bin" >> $GITHUB_PATH

      - name: Build
        run: make

      - name: Upload ROM artifact
        uses: actions/upload-artifact@v4
        with:
          name: game-rom
          path: "*.gba"
