name: Build GBA ROM

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: devkitpro/devkitarm:latest
      options: --entrypoint bash

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        shell: bash

      - name: Install GBA libraries
        run: dkp-pacman -Sy --noconfirm gba-dev
        shell: bash

      - name: Build ROM
        run: make
        shell: bash
        env:
          DEVKITPRO: /opt/devkitpro
          DEVKITARM: /opt/devkitpro/devkitARM
          PATH: /opt/devkitpro/tools/bin:/opt/devkitpro/devkitARM/bin:$PATH

      - name: Upload ROM artifact
        uses: actions/upload-artifact@v4
        with:
          name: my-game-rom
          path: my_game.gba
